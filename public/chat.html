<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 聊天 - DevToolBox</title>
<meta name="description" content="免费 AI 聊天工具，支持 DeepSeek、通义千问、Kimi、GLM、OpenAI 等主流大模型。自带 API Key 即可使用。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg-2:#0e0e16;--bg-3:#13131e;--bg-card:#111119;
  --cyan:#00d4ff;--cyan-dim:rgba(0,212,255,.15);--cyan-glow:rgba(0,212,255,.4);
  --purple:#8b5cf6;--green:#22d3a7;--amber:#f59e0b;--rose:#f43f5e;
  --text:#e4e4ef;--text-dim:#7a7a92;--text-muted:#4a4a62;
  --border:#1e1e2e;--border-lit:#2a2a3e;
  --font-head:'Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}
html,body{height:100%;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);
  -webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);opacity:.4}

/* Nav */
nav{position:relative;z-index:100;padding:14px 0;flex-shrink:0;
  background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-c{max-width:1000px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--font-head);font-weight:800;font-size:1.15rem;color:#fff;text-decoration:none;
  display:flex;align-items:center;gap:8px}
.logo-mark{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff}
.nav-r{display:flex;align-items:center;gap:20px}
.nav-r a{color:var(--text-dim);text-decoration:none;font-size:.82rem;font-family:var(--font-head);
  font-weight:500;transition:color .2s}
.nav-r a:hover,.nav-r a.active{color:var(--cyan)}
.nav-game{padding:5px 14px;border-radius:6px;border:1px solid var(--border-lit);
  background:var(--bg-3);transition:all .2s}
.nav-game:hover{border-color:var(--cyan);background:var(--cyan-dim)}

/* Settings Bar */
.settings-bar{flex-shrink:0;padding:10px 20px;background:var(--bg-2);border-bottom:1px solid var(--border)}
.settings-inner{max-width:1000px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cfg-group{display:flex;align-items:center;gap:6px}
.cfg-label{font-size:.7rem;color:var(--text-muted);white-space:nowrap}
.cfg-sel{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-3);
  color:var(--text);font-size:.75rem;font-family:var(--font-mono);outline:none;cursor:pointer;max-width:180px}
.cfg-sel:focus{border-color:var(--cyan)}
.cfg-input{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-3);
  color:var(--text);font-size:.75rem;font-family:var(--font-mono);outline:none;width:200px}
.cfg-input:focus{border-color:var(--cyan)}
.cfg-input::placeholder{color:var(--text-muted)}
.cfg-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg-3);
  color:var(--text-dim);font-size:.72rem;cursor:pointer;font-family:var(--font-head);transition:all .15s;white-space:nowrap}
.cfg-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.cfg-note{font-size:.68rem;color:var(--green);margin-left:auto}
.free-tag{display:inline-block;padding:1px 5px;border-radius:3px;background:rgba(34,211,167,.15);
  color:var(--green);font-size:.62rem;font-weight:600;margin-left:4px}

/* Chat Area */
.chat-area{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.chat-inner{max-width:760px;margin:0 auto}

/* Welcome */
.welcome{text-align:center;padding:60px 20px}
.welcome h2{font-family:var(--font-head);font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:8px}
.welcome h2 span{background:linear-gradient(135deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:.8rem;color:var(--text-muted);margin-bottom:20px}
.welcome-tips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tip{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);
  font-size:.75rem;color:var(--text-dim);cursor:pointer;transition:all .2s;max-width:200px;text-align:left}
.tip:hover{border-color:var(--cyan);color:var(--text)}

/* Messages */
.msg{margin-bottom:16px;display:flex;gap:10px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:.65rem;font-weight:700;color:#fff;margin-top:2px}
.msg-user .msg-avatar{background:var(--purple)}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--cyan),var(--green))}
.msg-body{flex:1;min-width:0}
.msg-name{font-size:.7rem;color:var(--text-muted);margin-bottom:3px;font-family:var(--font-head)}
.msg-content{font-size:.84rem;line-height:1.7;color:var(--text);word-break:break-word}
.msg-content p{margin-bottom:8px}
.msg-content p:last-child{margin-bottom:0}
.msg-content code{background:var(--bg-3);padding:2px 6px;border-radius:4px;font-size:.78rem;color:var(--cyan)}
.msg-content pre{background:var(--bg-3);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;
  position:relative}
.msg-content pre code{background:none;padding:0;color:var(--text)}
.msg-content ul,.msg-content ol{padding-left:20px;margin-bottom:8px}
.msg-content blockquote{border-left:3px solid var(--cyan);padding-left:12px;color:var(--text-muted);margin:8px 0}
.msg-content table{border-collapse:collapse;width:100%;margin:8px 0}
.msg-content th,.msg-content td{border:1px solid var(--border);padding:4px 8px;font-size:.78rem;text-align:left}
.msg-content th{background:var(--bg-3);color:#fff}
.msg-content a{color:var(--cyan)}
.msg-content h1,.msg-content h2,.msg-content h3{font-family:var(--font-head);color:#fff;margin:12px 0 6px}
.msg-content h1{font-size:1.2rem}.msg-content h2{font-size:1.05rem}.msg-content h3{font-size:.95rem}

.cursor-blink::after{content:'|';animation:blink 1s step-end infinite;color:var(--cyan)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.msg-error{color:var(--rose);font-size:.8rem;padding:8px 12px;border-radius:8px;
  border:1px solid rgba(244,63,94,.2);background:rgba(244,63,94,.05)}

/* Input Bar */
.input-bar{flex-shrink:0;padding:12px 20px 16px;background:var(--bg-2);border-top:1px solid var(--border)}
.input-inner{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;position:relative}
.chat-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-3);color:var(--text);font-size:.84rem;font-family:var(--font-mono);
  outline:none;resize:none;line-height:1.5;max-height:120px;min-height:42px}
.chat-input:focus{border-color:var(--cyan)}
.chat-input::placeholder{color:var(--text-muted)}
.send-btn{padding:10px 20px;border-radius:10px;border:none;background:var(--cyan);color:var(--bg);
  font-size:.84rem;font-weight:700;cursor:pointer;font-family:var(--font-head);
  transition:all .2s;white-space:nowrap;height:42px}
.send-btn:hover{box-shadow:0 0 16px var(--cyan-glow)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.input-hint{font-size:.65rem;color:var(--text-muted);margin-top:4px;text-align:center}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:8px 20px;
  border-radius:8px;background:#fff;color:#000;font-size:.82rem;font-weight:600;
  font-family:var(--font-head);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
  .settings-inner{gap:6px}
  .cfg-input{width:140px}
  .cfg-note{display:none}
  .welcome-tips{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<nav><div class="nav-c">
  <a href="/" class="logo"><div class="logo-mark">DT</div>DevToolBox</a>
  <div class="nav-r">
    <a href="/">工具</a>
    <a href="/chat.html" class="active">AI 聊天</a>
    <a href="/game.html" class="nav-game">游戏</a>
  </div>
</div></nav>

<div class="settings-bar"><div class="settings-inner">
  <div class="cfg-group">
    <span class="cfg-label">服务商</span>
    <select class="cfg-sel" id="providerSel" onchange="onProviderChange()"></select>
  </div>
  <div class="cfg-group">
    <span class="cfg-label">模型</span>
    <select class="cfg-sel" id="modelSel"></select>
  </div>
  <div class="cfg-group">
    <span class="cfg-label">API Key</span>
    <input class="cfg-input" id="apiKeyInput" type="password" placeholder="输入你的 API Key" oninput="saveSettings()">
  </div>
  <button class="cfg-btn" onclick="toggleKeyVisibility()" id="toggleKeyBtn">显示</button>
  <button class="cfg-btn" onclick="getKeyHelp()">获取 Key</button>
  <button class="cfg-btn" onclick="newChat()">新对话</button>
  <span class="cfg-note" id="providerNote"></span>
</div></div>

<div class="chat-area" id="chatArea">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <h2>AI <span>聊天助手</span></h2>
      <p>支持 DeepSeek、通义千问、Kimi、GLM、OpenAI 等主流大模型<br>输入你的 API Key 即可开始对话</p>
      <div class="welcome-tips">
        <div class="tip" onclick="useTip(this)">帮我写一个 Python 快速排序函数</div>
        <div class="tip" onclick="useTip(this)">用简单的话解释什么是 REST API</div>
        <div class="tip" onclick="useTip(this)">帮我优化这段 SQL 查询的性能</div>
      </div>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-inner">
    <div class="input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"
        rows="1" onkeydown="onInputKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
  <div class="input-hint">API Key 仅保存在浏览器本地，不会上传到服务器</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== Providers Config ====================
const PROVIDERS = {
  siliconflow: {
    name: '硅基流动 (SiliconFlow)',
    url: 'https://api.siliconflow.cn/v1/chat/completions',
    models: [
      { id: 'deepseek-ai/DeepSeek-V3', name: 'DeepSeek V3', free: true },
      { id: 'Qwen/Qwen2.5-7B-Instruct', name: 'Qwen 2.5 7B', free: true },
      { id: 'THUDM/glm-4-9b-chat', name: 'GLM-4 9B', free: true },
      { id: 'deepseek-ai/DeepSeek-R1-Distill-Qwen-7B', name: 'DeepSeek R1 7B', free: true },
    ],
    keyUrl: 'https://cloud.siliconflow.cn/',
    note: '注册即送免费额度'
  },
  deepseek: {
    name: 'DeepSeek (深度求索)',
    url: 'https://api.deepseek.com/chat/completions',
    models: [
      { id: 'deepseek-chat', name: 'DeepSeek Chat (V3)' },
      { id: 'deepseek-reasoner', name: 'DeepSeek Reasoner (R1)' },
    ],
    keyUrl: 'https://platform.deepseek.com/',
    note: '注册赠送额度，性价比极高'
  },
  moonshot: {
    name: 'Moonshot (Kimi)',
    url: 'https://api.moonshot.cn/v1/chat/completions',
    models: [
      { id: 'moonshot-v1-8k', name: 'Kimi 8K' },
      { id: 'moonshot-v1-32k', name: 'Kimi 32K' },
    ],
    keyUrl: 'https://platform.moonshot.cn/',
    note: '注册送额度'
  },
  zhipu: {
    name: '智谱AI (GLM)',
    url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
    models: [
      { id: 'glm-4-flash', name: 'GLM-4 Flash', free: true },
      { id: 'glm-4-air', name: 'GLM-4 Air' },
      { id: 'glm-4', name: 'GLM-4' },
    ],
    keyUrl: 'https://open.bigmodel.cn/',
    note: 'GLM-4 Flash 免费'
  },
  openai: {
    name: 'OpenAI',
    url: 'https://api.openai.com/v1/chat/completions',
    models: [
      { id: 'gpt-4o-mini', name: 'GPT-4o Mini' },
      { id: 'gpt-4o', name: 'GPT-4o' },
    ],
    keyUrl: 'https://platform.openai.com/',
    note: '需海外支付方式'
  },
  custom: {
    name: '自定义 (OpenAI 兼容)',
    url: '',
    models: [
      { id: 'custom', name: '自定义模型' },
    ],
    keyUrl: '',
    note: '填写兼容 OpenAI 格式的 API 地址'
  }
};

// ==================== State ====================
let chatMessages = [];  // { role, content }
let isStreaming = false;
let abortController = null;

// ==================== Init ====================
function init() {
  const provSel = document.getElementById('providerSel');
  for (const [key, prov] of Object.entries(PROVIDERS)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = prov.name;
    provSel.appendChild(opt);
  }

  // Restore settings
  const saved = JSON.parse(localStorage.getItem('dtb_chat_settings') || '{}');
  if (saved.provider && PROVIDERS[saved.provider]) {
    provSel.value = saved.provider;
  }
  onProviderChange();

  if (saved.model) {
    document.getElementById('modelSel').value = saved.model;
  }
  if (saved.keys) {
    const currentProvider = provSel.value;
    if (saved.keys[currentProvider]) {
      document.getElementById('apiKeyInput').value = saved.keys[currentProvider];
    }
  }

  // Restore chat history
  const chatSaved = JSON.parse(localStorage.getItem('dtb_chat_history') || '[]');
  if (chatSaved.length > 0) {
    chatMessages = chatSaved;
    document.getElementById('welcome').style.display = 'none';
    chatMessages.forEach(msg => appendMessageUI(msg.role, msg.content, false));
    scrollToBottom();
  }
}

function onProviderChange() {
  const provKey = document.getElementById('providerSel').value;
  const prov = PROVIDERS[provKey];
  const modelSel = document.getElementById('modelSel');
  modelSel.innerHTML = '';

  prov.models.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    let label = m.name;
    if (m.free) label += ' [免费]';
    opt.textContent = label;
    modelSel.appendChild(opt);
  });

  document.getElementById('providerNote').textContent = prov.note || '';

  // Restore key for this provider
  const saved = JSON.parse(localStorage.getItem('dtb_chat_settings') || '{}');
  const keys = saved.keys || {};
  document.getElementById('apiKeyInput').value = keys[provKey] || '';

  saveSettings();
}

function saveSettings() {
  const provKey = document.getElementById('providerSel').value;
  const model = document.getElementById('modelSel').value;
  const apiKey = document.getElementById('apiKeyInput').value;

  const saved = JSON.parse(localStorage.getItem('dtb_chat_settings') || '{}');
  const keys = saved.keys || {};
  keys[provKey] = apiKey;

  localStorage.setItem('dtb_chat_settings', JSON.stringify({
    provider: provKey,
    model: model,
    keys: keys
  }));
}

function saveChatHistory() {
  localStorage.setItem('dtb_chat_history', JSON.stringify(chatMessages));
}

// ==================== UI Helpers ====================
let toastTimer;
function showToast(msg, dur) {
  dur = dur || 2000;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, dur);
}

function toggleKeyVisibility() {
  const inp = document.getElementById('apiKeyInput');
  const btn = document.getElementById('toggleKeyBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '隐藏';
  } else {
    inp.type = 'password';
    btn.textContent = '显示';
  }
}

function getKeyHelp() {
  const provKey = document.getElementById('providerSel').value;
  const prov = PROVIDERS[provKey];
  if (prov.keyUrl) {
    window.open(prov.keyUrl, '_blank');
  } else {
    showToast('请自行填写 API 地址和 Key');
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function useTip(el) {
  document.getElementById('chatInput').value = el.textContent;
  autoResize(document.getElementById('chatInput'));
  sendMessage();
}

function newChat() {
  chatMessages = [];
  localStorage.removeItem('dtb_chat_history');
  const inner = document.getElementById('chatInner');
  inner.innerHTML = '';

  // Restore welcome
  inner.innerHTML = '<div class="welcome" id="welcome">' +
    '<h2>AI <span>聊天助手</span></h2>' +
    '<p>支持 DeepSeek、通义千问、Kimi、GLM、OpenAI 等主流大模型<br>输入你的 API Key 即可开始对话</p>' +
    '<div class="welcome-tips">' +
    '<div class="tip" onclick="useTip(this)">帮我写一个 Python 快速排序函数</div>' +
    '<div class="tip" onclick="useTip(this)">用简单的话解释什么是 REST API</div>' +
    '<div class="tip" onclick="useTip(this)">帮我优化这段 SQL 查询的性能</div>' +
    '</div></div>';

  if (isStreaming && abortController) {
    abortController.abort();
    isStreaming = false;
  }
  updateSendBtn();
  showToast('已开始新对话');
}

// ==================== Message Rendering ====================
function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    try { return marked.parse(text); } catch(e) {}
  }
  return text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function appendMessageUI(role, content, animate) {
  if (animate === undefined) animate = true;
  const inner = document.getElementById('chatInner');
  const div = document.createElement('div');
  div.className = 'msg msg-' + (role === 'user' ? 'user' : 'ai');
  if (!animate) div.style.animation = 'none';

  const avatarText = role === 'user' ? 'U' : 'AI';
  const nameText = role === 'user' ? '你' : 'AI 助手';
  const bodyHtml = role === 'user'
    ? '<div class="msg-content">' + escapeHtml(content).replace(/\n/g, '<br>') + '</div>'
    : '<div class="msg-content">' + renderMarkdown(content) + '</div>';

  div.innerHTML = '<div class="msg-avatar">' + avatarText + '</div>' +
    '<div class="msg-body"><div class="msg-name">' + nameText + '</div>' + bodyHtml + '</div>';

  inner.appendChild(div);
  return div;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== Streaming Chat ====================
function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  if (isStreaming) {
    btn.textContent = '停止';
    btn.disabled = false;
    btn.onclick = stopStreaming;
  } else {
    btn.textContent = '发送';
    btn.disabled = false;
    btn.onclick = sendMessage;
  }
}

function stopStreaming() {
  if (abortController) {
    abortController.abort();
  }
}

async function sendMessage() {
  if (isStreaming) return;

  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const provKey = document.getElementById('providerSel').value;
  const prov = PROVIDERS[provKey];
  const model = document.getElementById('modelSel').value;
  const apiKey = document.getElementById('apiKeyInput').value.trim();

  if (!apiKey) {
    showToast('请先输入 API Key');
    document.getElementById('apiKeyInput').focus();
    return;
  }

  let apiUrl = prov.url;
  if (provKey === 'custom') {
    apiUrl = prompt('请输入 API 地址 (OpenAI 兼容格式):', apiUrl || 'https://');
    if (!apiUrl) return;
    PROVIDERS.custom.url = apiUrl;
  }

  if (!apiUrl) {
    showToast('API 地址无效');
    return;
  }

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  // Add user message
  chatMessages.push({ role: 'user', content: text });
  appendMessageUI('user', text);
  input.value = '';
  input.style.height = 'auto';
  scrollToBottom();
  saveSettings();
  saveChatHistory();

  // Start streaming
  isStreaming = true;
  abortController = new AbortController();
  updateSendBtn();

  // Create AI message placeholder
  const aiDiv = appendMessageUI('assistant', '');
  const contentEl = aiDiv.querySelector('.msg-content');
  contentEl.classList.add('cursor-blink');
  scrollToBottom();

  let fullResponse = '';

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apiUrl: apiUrl,
        apiKey: apiKey,
        model: model,
        messages: chatMessages.filter(function(m) { return m.role !== 'error'; })
      }),
      signal: abortController.signal
    });

    if (!response.ok) {
      const errData = await response.json().catch(function() { return { error: '请求失败 (' + response.status + ')' }; });
      throw new Error(errData.error ? (typeof errData.error === 'object' ? JSON.stringify(errData.error) : errData.error) : '请求失败');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;

      buffer += decoder.decode(result.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
        try {
          var json = JSON.parse(line.slice(6));
          var delta = json.choices && json.choices[0] && json.choices[0].delta;
          if (delta && delta.content) {
            fullResponse += delta.content;
            contentEl.innerHTML = renderMarkdown(fullResponse);
            scrollToBottom();
          }
        } catch(parseErr) {}
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      if (!fullResponse) {
        fullResponse = '(已停止)';
      }
    } else {
      contentEl.classList.remove('cursor-blink');
      contentEl.innerHTML = '';
      var errDiv = document.createElement('div');
      errDiv.className = 'msg-error';
      errDiv.textContent = '错误: ' + e.message;
      contentEl.appendChild(errDiv);
      fullResponse = '';
    }
  }

  contentEl.classList.remove('cursor-blink');

  if (fullResponse) {
    chatMessages.push({ role: 'assistant', content: fullResponse });
    contentEl.innerHTML = renderMarkdown(fullResponse);
  }

  isStreaming = false;
  abortController = null;
  updateSendBtn();
  saveChatHistory();
  scrollToBottom();
}

// ==================== Start ====================
init();
</script>
</body>
</html>
